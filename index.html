<html>
  <head>
    <meta charset="utf-8" />
    <meta

      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <script src="webxdc.js"></script>
    <style>
      :root {
        --bg-primary: #000000;
        --bg-secondary: #313131;

        --text-primary: #ffffff;

          --bg-secondary: #f0f0f0;
          --bg-tertiary: #e0e0e0;
          --bg-modal-backdrop: rgba(220, 220, 220, 0.8);

          --text-secondary: #333333;
          --text-tertiary: #666666;
          --border-color: #cccccc;
        }
      }

      html,
      body {
